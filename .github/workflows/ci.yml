---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-markdown:
    uses: dchonch/actions/.github/workflows/lint-markdown.yml@main
    permissions:
      contents: read

  lint-awesome:
    uses: dchonch/actions/.github/workflows/lint-awesome.yml@main
    permissions:
      contents: read

  security:
    uses: dchonch/actions/.github/workflows/security.yml@main
    permissions:
      contents: read
      pull-requests: read
