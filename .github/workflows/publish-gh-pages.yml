---
name: Publish GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    uses: dchonch/actions/.github/workflows/publish-gh-pages.yml@main
    permissions:
      contents: read
      pages: write
      id-token: write
